<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SyncWatch · Room</title>
  <link rel="stylesheet" href="/style.css"/>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body class="bg">
  <div class="roomWrap">

    <div class="topBar">
      <div class="brand small">
        <div class="dot"></div>
        <div>
          <div class="title" id="roomTitle">Комната</div>
          <div class="subtitle" id="roomSub">Подключение...</div>
        </div>
      </div>

      <div class="topRight">
        
        <div class="pill" id="mePill">Вы: —</div>
        <div class="pill" id="hostPill">HOST: —</div>
        <button class="btn ghost" id="inviteBtn">Пригласить ссылкой</button>
        <button class="btn danger" id="leaveBtn">Leave</button>
      </div>
    </div>

    <!-- красивый экран "не найдена" -->
    <div class="card notFound" id="notFound" style="display:none;">
      <div class="nfTitle">Комната не найдена</div>
      <div class="nfText" id="nfText">Комнаты не существует.</div>
      <div class="hr"></div>
      <button class="btn primary" id="backBtn">Вернуться в меню</button>
    </div>

    <div class="grid" id="grid">

      <div class="card pad">
        <div class="label">Ссылка YouTube / ID</div>
        <div class="row">
          <input class="input grow" id="ytInput" placeholder="https://www.youtube.com/watch?v=... или youtu.be/...">
          <button class="btn primary" id="loadBtn">Загрузить</button>
        </div>

        <div class="hr"></div>

        <div class="playerWrap">
          <div class="playerInner" id="player"></div>
        </div>

        <div class="hr"></div>

        <div class="smallNote">
          Сервер хранит состояние и время обновления. Клиенты подгоняются по дрейфу и делают периодический ресинк.
        </div>
      </div>

      <div class="side">
        <div class="card pad">
          <div class="label">Логи</div>
          <div class="logs" id="logs"></div>
        </div>

        <div class="card pad chatCard">
          <div class="label">Чат</div>
          <div class="chatList" id="chatList"></div>

          <div class="hr"></div>

          <div class="row">
            <input class="input grow" id="chatInput" placeholder="Сообщение...">
            <button class="btn primary" id="sendBtn">Отправить</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player = null;
let playerReady = false;

window.onYouTubeIframeAPIReady = function() {
  player = new YT.Player('player', {
    height: '100%',
    width: '100%',
    videoId: '',
    playerVars: {
      playsinline: 1
    },
    events: {
      onReady: function() {
        playerReady = true;
        console.log("YouTube Player Ready");
        applyifReady ();
      }
    }
  });
};
</script>
  <script src="/client.js"></script>
</body>

</html>
