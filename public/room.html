<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SyncWatch · Room</title>
  <link rel="stylesheet" href="/style.css"/>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg">
  <div class="roomWrap">
 
      <div class="nfText" id="nfText">Комнаты не существует.</div>
      <div class="hr"></div>
      <button class="btn primary" id="backBtn">Вернуться в меню</button>
    </div>

    <div class="grid" id="grid">

      <div class="card pad">
        <div class="label">Ссылка YouTube / ID</div>
        <div class="row">
          <input class="input grow" id="ytInput" placeholder="https://www.youtube.com/watch?v=... или youtu.be/...">
          <button class="btn primary" id="loadBtn">Загрузить</button>
        </div>

        <div class="hr"></div>

        <div class="playerWrap">
          <div class="playerInner" id="player"></div>
        </div>

        <div class="hr"></div>

        <div class="smallNote">
          Сервер хранит состояние и время обновления. Клиенты подгоняются по дрейфу и делают периодический ресинк.
        </div>
      </div>

      <div class="side">
        <div class="card pad">
          <div class="label">Логи</div>
          <div class="logs" id="logs"></div>
        </div>

        <div class="card pad chatCard">
          <div class="label">Чат</div>
          <div class="chatList" id="chatList"></div>

          <div class="hr"></div>

          <div class="row">
            <input class="input grow" id="chatInput" placeholder="Сообщение...">
            <button class="btn primary" id="sendBtn">Отправить</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="/app.js"></script>
</body>
</html>
