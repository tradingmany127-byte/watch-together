<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Watch Night</title>

  <link rel="stylesheet" href="./styles.css" />

  <!-- Socket.io клиент -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- YouTube IFrame API -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <!-- Firebase Auth (Email+Google) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
</head>
<body>

  <div class="app">
    <div class="header">
      <div class="brand">
        <span class="moon">🌙</span>
        <span class="title">Watch Night</span>
      </div>

      <div class="header-right">
        <div class="user-badge" id="authBadge">Не вошёл</div>
        <button class="icon-btn" id="settingsBtn" title="Настройки">⚙️</button>
      </div>
    </div>

    <div class="topbar">
      <div class="row">
        <input id="roomId" class="input" placeholder="Room ID (например 123)" />
        <button id="joinBtn" class="btn primary">Join</button>

        <div class="pill" id="rolePill">Role: viewer</div>
        <button id="hostBtn" class="btn">Я Host</button>

        <button id="voiceBtn" class="btn">🎙 Voice (вкл)</button>
        <button id="leaveBtn" class="btn danger">Leave</button>
      </div>

      <div class="row">
        <input id="username" class="input" placeholder="Имя пользователя (username)" />
        <input id="ytLink" class="input grow" placeholder="YouTube link (https://...)" />
        <button id="sendVideoBtn" class="btn primary">Send Video</button>
      </div>

      <div class="status" id="statusLine">⏳ Готов. Войди в комнату.</div>
    </div>

    <div class="main">
      <div class="panel video-panel">
        <div class="panel-title">Видео</div>
        <div id="playerWrap" class="player-wrap">
          <div id="player" class="player"></div>
        </div>

        <div class="video-controls">
          <button id="syncNowBtn" class="btn small">⚡ Sync now</button>
          <button id="copyInviteBtn" class="btn small">🔗 Copy invite</button>
          <div class="hint">Хост управляет. Вьюверы синхронизируются автоматически.</div>
        </div>
      </div>

      <div class="panel chat-panel">
        <div class="panel-title">Чат</div>
        <div id="chatBox" class="chat-box"></div>

        <div class="chat-input">
          <input id="chatInput" class="input grow" placeholder="Напиши сообщение..." />
          <button id="chatSendBtn" class="btn primary">Send</button>
        </div>

        <div class="users-box">
          <div class="users-title">Участники</div>
          <div id="usersList" class="users-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- SETTINGS MENU -->
  <div class="modal-backdrop hidden" id="settingsModal">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title">Настройки</div>
        <button class="icon-btn" id="settingsClose">✖</button>
      </div>

      <div class="modal-body">
        <button class="btn block" id="openRegister">Регистрация</button>
        <button class="btn block" id="openLogin">Войти</button>

        <div class="divider"></div>

        <div class="menu-item">
          <div class="menu-title">Мы в соц сетях!</div>
          <a class="link" href="https://t.me/watchtog" target="_blank" rel="noreferrer">t.me/watchtog</a>
        </div>

        <div class="divider"></div>

        <!-- 2 фичи от меня -->
        <button class="btn block" id="toggleThemeBtn">🌗 Тема: переключить</button>
        <button class="btn block" id="muteAllBtn">🔇 Mute voice</button>
      </div>
    </div>
  </div>

  <!-- AUTH MODAL -->
  <div class="modal-backdrop hidden" id="authModal">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title" id="authTitle">Войти</div>
        <button class="icon-btn" id="authClose">✖</button>
      </div>

      <div class="modal-body">
        <div class="banner">
          <b>Наш Telegram:</b>
          <a class="link" href="https://t.me/watchtog" target="_blank" rel="noreferrer">t.me/watchtog</a>
        </div>

        <div class="field">
          <label>Email</label>
          <input id="authEmail" class="input" placeholder="you@example.com" />
        </div>
        <div class="field">
          <label>Password</label>
          <input id="authPass" class="input" type="password" placeholder="••••••••" />
        </div>

        <button class="btn primary block" id="authSubmit">Продолжить</button>
        <button class="btn block" id="googleBtn">Войти через Google</button>

        <div class="divider"></div>
        <button class="btn danger block" id="logoutBtn">Выйти из аккаунта</button>

        <div class="small-note" id="authHint"></div>
      </div>
    </div>
  </div>

  <script src="./client.js"></script>
</body>
</html>
