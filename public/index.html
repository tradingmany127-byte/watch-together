<div class="container">

  <div class="row">

<script>
(async () => {
  try {
    const res = await fetch('/me');
    if (!res.ok) return;
    const data = await res.json();
    if (!data?.user) return;

    document.getElementById('loggedOut').style.display = 'none';
    document.getElementById('loggedIn').style.display = 'block';
    document.getElementById('userName').textContent = data.user.displayName || data.user.email || 'User';
  } catch (e) {}
})();
</script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>

  <script>
    const socket = io();

    let roomId = null;
    let player = null;

    // роль
    let isHost = false;
    const rolePill = document.getElementById("rolePill");

    // защита от зацикливания
    let applyingRemote = false;

    // троттлинг
    let lastSentAt = 0;

    function setStatus(t) {
      document.getElementById("status").innerText = t;
    }
    function setRole(host) {
      isHost = host;
      rolePill.textContent = "роль: " + (isHost ? "host" : "viewer");
      setStatus(isHost ? "✅ Вы выбрали HOST" : "✅ Вы выбрали JOIN");
    }

    function extractVideoId(input) {
      if (!input) return null;
      const url = input.trim();
      if (/^[a-zA-Z0-9_-]{11}$/.test(url)) return url;
      const match = url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
      return match ? match[1] : null;
    }

    function safeGetTime() {
      try { return player ? player.getCurrentTime() : 0; } catch(e) { return 0; }
    }
    function safeGetVideoId() {
      try {
        if (!player) return null;
        const data = player.getVideoData();
        return data && data.video_id ? data.video_id : null;
      } catch(e) { return null; }
    }
    function safeIsPlaying() {
      try {
        if (!player) return false;
        const st = player.getPlayerState();
        return st === YT.PlayerState.PLAYING;
      } catch(e) { return false; }
    }

    // ---- YouTube init ----
    window.onYouTubeIframeAPIReady = function () {
      player = new YT.Player("player", {
        height: "390",
        width: "640",
        videoId: "",
        playerVars: { playsinline: 1 },
        events: {
          onReady: () => setStatus("✅ Плеер готов.\nПодключись к комнате."),
          onStateChange: onPlayerStateChange
        }
      });
    };

    function canSend() {
      // отправлять события может только Host
      return roomId && player && isHost && !applyingRemote;
    }

    function emitPlayer(type) {
      const now = Date.now();
      if (now - lastSentAt < 250) return; // анти-спам
      lastSentAt = now;

      socket.emit("player-event", {
        roomId,
        type,
        time: safeGetTime(),
        isPlaying: safeIsPlaying(),
        videoId: safeGetVideoId()
      });
    }

    // локальные события (только Host)
    function onPlayerStateChange(event) {
      if (!canSend()) return;

      if (event.data === YT.PlayerState.PLAYING) emitPlayer("play");
      if (event.data === YT.PlayerState.PAUSED) emitPlayer("pause");
    }

    // мягкая синхронизация (только Host шлёт)
    setInterval(() => {
      if (!canSend()) return;
      if (!safeIsPlaying()) return;
      emitPlayer("sync");
    }, 2500);

    // детект ручной перемотки (только Host)
    let lastTime = 0;
    setInterval(() => {
      if (!canSend()) { lastTime = safeGetTime(); return; }
      const t = safeGetTime();
      const diff = Math.abs(t - lastTime);
      if (diff > 1.4) {
        emitPlayer("seek");
      }
      lastTime = t;
    }, 400);

    // ---- UI ----
    document.getElementById("join").onclick = () => {
      const rid = document.getElementById("room").value.trim();
      if (!rid) return alert("Введи Room ID");
      roomId = rid;
      socket.emit("join-room", { roomId });
      setStatus("✅ В комнате: " + roomId + "\nРоль: " + (isHost ? "host" : "viewer"));
    };

    document.getElementById("host").onclick = () => {
      setRole(true);
      setStatus("✅ Ты Host.\nТеперь ты управляешь видео.\n(Если вы оба Host — будет конфликт)");
    };

    document.getElementById("send").onclick = () => {
      if (!roomId) return alert("Сначала Join");
      if (!player) return alert("Плеер ещё не готов");
      if (!isHost) return alert("Send Video делает только Host (иначе ломается синхрон)");

      const videoId = extractVideoId(document.getElementById("url").value);
      if (!videoId) return alert("Не смог распознать ссылку/ID");

      socket.emit("set-video", { roomId, videoId });
      setStatus("📤 Отправил видео: " + videoId);
    };

    // ---- Server events ----
    socket.on("room-state", (state) => {
      if (!state || !player) return;

      applyingRemote = true;

      const { videoId, time, isPlaying } = state;
      if (videoId) {
        player.loadVideoById(videoId, time || 0);

        setTimeout(() => {
          try {
            if (isPlaying) player.playVideo();
            else player.pauseVideo();
          } catch(e) {}
          applyingRemote = false;
        }, 650);
      } else {
        applyingRemote = false;
      }
    });

    socket.on("player-event", (p) => {
      if (!p || !player) return;

      applyingRemote = true;

      const { type, time, isPlaying, videoId } = p;

      const currentId = safeGetVideoId();
      if (videoId && videoId !== currentId) {
        player.loadVideoById(videoId, time || 0);
        setTimeout(() => {
          try {
            if (isPlaying) player.playVideo();
            else player.pauseVideo();
          } catch(e) {}
          applyingRemote = false;
        }, 650);
        return;
      }

      try {
        if (type === "play") {
          // play: подравниваем если сильно разъехались
          const local = safeGetTime();
          if (typeof time === "number" && Math.abs(local - time) > 1.2) player.seekTo(time, true);
          player.playVideo();
        }

        if (type === "pause") {
          if (typeof time === "number") player.seekTo(time, true);
          player.pauseVideo();
        }

        if (type === "seek") {
          if (typeof time === "number") player.seekTo(time, true);
        }

        if (type === "sync") {
          // sync: мягко, только если рассинхрон большой
          const local = safeGetTime();
          if (typeof time === "number" && Math.abs(local - time) > 1.6) {
            player.seekTo(time, true);
          }
          if (isPlaying) player.playVideo();
        }
      } catch(e) {
        console.log("player-event error", e);
      }
f
      applyingRemote = false;
    });

    // стартовая роль
    setRole(false);
   // ===== VOICE WEBRTC CLIENT =====

let localStream;
let peerConnection;
let isVoiceOn = false;
let currentRoomId;

const voiceBtn = document.getElementById("voiceBtn");

const config = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" }
  ]
};

// перехватываем join-room чтобы сохранить комнату
const originalEmit = socket.emit.bind(socket);
socket.emit = function(event, data) {
  if (event === "join-room" && data?.roomId) {
    currentRoomId = data.roomId;
  }
  return originalEmit(event, data);
};

voiceBtn.addEventListener("click", async () => {
  if (!currentRoomId) {
    alert("Сначала зайди в комнату");
    return
  }

  if (!isVoiceOn) {
    await startVoice();
    voiceBtn.innerText = "🎙 Voice (выкл)";
    isVoiceOn = true;
  } else {
    stopVoice();
    voiceBtn.innerText = "🎙 Voice (вкл)";
    isVoiceOn = false;
  }
});

async function startVoice() {
  localStream = await navigator.mediaDevices.getUserMedia({ audio: true });

  peerConnection = new RTCPeerConnection(config);
  localStream.getTracks().forEach(track => {
  peerConnection.addTrack(track, localStream);
});
peerConnection.ontrack = (e) => {
  console.log("ONTRACK!", e.streams);
  const a = document.getElementById("remoteAudio");
  if (!a) return console.log("remoteAudio not found");
  a.srcObject = e.streams[0];
  a.play?.().catch(err => console.log("play err", err));
};
  

  peerConnection.onicecandidate = (event) => {
    if (event.candidate) {
      socket.emit("webrtc-ice", {
        roomId: currentRoomId,
        candidate: event.candidate
      });
    }
  };

  const offer = await peerConnection.createOffer();
  await peerConnection.setLocalDescription(offer);

  socket.emit("webrtc-offer", {
    roomId: currentRoomId,
    offer
  });
}

function stopVoice() {
  if (localStream) {
    localStream.getTracks().forEach(track => track.stop());
  }
  if (peerConnection) {
    peerConnection.close();
  }
}

// === входящие сигналы ===

socket.on("webrtc-offer", async ({ offer }) => {
  peerConnection = new RTCPeerConnection(config);

  peerConnection.onicecandidate = (event) => {
    if (event.candidate) {
      socket.emit("webrtc-ice", {
        roomId: currentRoomId,
        candidate: event.candidate
      });
    }
  };

  await peerConnection.setRemoteDescription(offer);

  const answer = await peerConnection.createAnswer();
  await peerConnection.setLocalDescription(answer);

  socket.emit("webrtc-answer", {
    roomId: currentRoomId,
    answer
  });
});

socket.on("webrtc-answer", async ({ answer }) => {
  await peerConnection.setRemoteDescription(answer);
});

socket.on("webrtc-ice", async ({ candidate }) => {
  if (peerConnection) {
    await peerConnection.addIceCandidate(candidate);
  }
}); 
  </script>
