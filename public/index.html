<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SyncWatch</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body class="bg">
  <div class="wrap">
    <div class="brand">
      <div class="dot"></div>
      <div>
        <div class="title">SyncWatch</div>
        <div class="subtitle">Синхронный просмотр YouTube · Dark премиум</div>
      </div>
    </div>

    <div class="card center">
      <div class="label">Имя пользователя (обязательно)</div>
      <input class="input" id="nameInput" placeholder="Например: Alex" maxlength="24">

      <button class="btn primary" id="createBtn">Создать комнату</button>

      <div class="hr"></div>

      <div class="label">Вход в комнату</div>
      <div class="row">
        <input class="input grow" id="roomInput" inputmode="numeric" placeholder="Введите ID комнаты (только цифры)">
        <button class="btn" id="joinBtn">Войти</button>
      </div>

      <button class="btn ghost" id="settingsBtn">Настройки</button>

      <div class="hint">ID комнаты — только числа. Без букв и символов.</div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="modal" id="modal">
      <div class="modalCard">
        <div class="modalTop">
          <div>
            <div class="modalTitle">Настройки</div>
            <div class="modalSub">Пока заглушки (функционал позже).</div>
          </div>
          <button class="btn ghost" id="closeModal">Закрыть</button>
        </div>

        <div class="chips">
          <button class="btn chip">Регистрация</button>
          <button class="btn chip">Вход</button>
          <button class="btn chip">Профиль</button>
          <button class="btn chip">Бонусы</button>
          <button class="btn chip">Реферальная система</button>
          <button class="btn chip">Выйти</button>
        </div>
      </div>
    </div>
  </div>

<script>
  const toastEl = document.getElementById("toast");
  function toast(title, text) {
    toastEl.innerHTML = `<b>${title}</b><div>${text}</div>`;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2600);
  }

  const nameInput = document.getElementById("nameInput");
  const roomInput = document.getElementById("roomInput");

  roomInput.addEventListener("input", () => roomInput.value = roomInput.value.replace(/[^\d]/g, ""));

  function getName() {
    return (nameInput.value || "").trim();
  }

  document.getElementById("createBtn").onclick = async () => {
    const name = getName();
    if (!name) {
      toast("Нужно имя", "Сначала введи имя пользователя (без него нельзя создать комнату).");
      return;
    }
    const r = await fetch("/api/create-room");
    const j = await r.json();
    location.href = `/room/${j.roomId}?name=${encodeURIComponent(name)}&asCreator=1`;
  };

  document.getElementById("joinBtn").onclick = async () => {
    const name = getName();
    const id = (roomInput.value || "").trim();

    if (!name) {
      toast("Нужно имя", "Сначала введи имя пользователя (без него нельзя войти).");
      return;
    }
    if (!id) {
      toast("Нужен ID", "Сначала введи числовой ID комнаты и попробуй снова.");
      return;
    }

    const res = await fetch(`/api/room-exists/${id}`);
    const data = await res.json();
    if (!data.exists) {
      toast("Комната не найдена", `Комнаты #${id} не существует.`);
      return;
    }

    location.href = `/room/${id}?name=${encodeURIComponent(name)}`;
  };

  // Settings modal
  const modal = document.getElementById("modal");
  document.getElementById("settingsBtn").onclick = () => modal.classList.add("open");
  document.getElementById("closeModal").onclick = () => modal.classList.remove("open");
  modal.addEventListener("mousedown", (e) => { if (e.target === modal) modal.classList.remove("open"); });
</script>
</body>
</html>
